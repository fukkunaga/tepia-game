<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEPIA RUN!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #FFF0F5, #E8F4FF, #F0FFF0);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
}
h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.6rem, 6vw, 2.8rem);
  color: #FF6B9D;
  text-shadow: 3px 3px 0 #FFB3D1;
  margin-bottom: 4px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.sub {
  color: #B8A8CC;
  font-size: clamp(0.6rem, 2.5vw, 0.8rem);
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.wrapper {
  background: white;
  border-radius: 20px;
  padding: 10px 10px 6px;
  box-shadow: 0 6px 0 #FFD6E8, 0 12px 40px rgba(255,107,157,0.15);
  border: 3px solid #FFE0EE;
  width: min(96vw, 720px);
}
.scorebar {
  display: flex;
  justify-content: space-between;
  padding: 4px 8px 8px;
  font-family: 'Fredoka One', cursive;
}
.sc-label { font-size: 0.55rem; color: #CCC; letter-spacing: 1px; font-family:'Nunito',sans-serif; font-weight:800; }
.sc-val { font-size: 1.3rem; color: #7B68EE; }
.sc-best { color: #FF6B9D; }
canvas { border-radius: 12px; display: block; width: 100%; height: auto; }
.hint { text-align:center; padding: 8px 0 2px; color:#CCC; font-size:0.72rem; font-weight:800; }
</style>
</head>
<body>
<h1>🤖 TEPIA RUN!</h1>
<p class="sub">JUMP TO AVOID OBSTACLES!</p>
<div class="wrapper">
  <div class="scorebar">
    <div><div class="sc-label">SCORE</div><div class="sc-val" id="sc">0</div></div>
    <div style="text-align:right"><div class="sc-label">BEST</div><div class="sc-val sc-best" id="best">0</div></div>
  </div>
  <canvas id="c" width="680" height="210"></canvas>
  <div class="hint" id="hint">スペース / タップ でジャンプ ✨</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scEl = document.getElementById('sc');
const bestEl = document.getElementById('best');
const hintEl = document.getElementById('hint');

const tepia = new Image();
tepia.crossOrigin = 'anonymous';
tepia.src = 'https://raw.githubusercontent.com/fukkunaga/tepia-game/main/tepian01.png';

// Responsive: base canvas is 680x210, CSS scaled to fit screen width
const BASE_W = 680, BASE_H = 210;
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth * 0.94, 720) - 26;
  const scale = maxW / BASE_W;
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const GW = BASE_W, GH = BASE_H;
const GROUND = 160;
const GRAVITY = 0.55;
const JUMP_POWER = -13;
const OB_COLORS = ['#FF8FAB','#FFB347','#87CEEB','#98FB98','#DDA0DD','#F0E68C'];

const clouds = [
  { x: 100, y: 28, s: 1.0 },
  { x: 320, y: 18, s: 0.7 },
  { x: 530, y: 38, s: 0.85 },
];

let particles = [];
function spawnParticles(x, y) {
  const emojis = ['⭐','✨','💫','🌸','💕'];
  for (let i = 0; i < 5; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*4,
      vy: -Math.random()*4-2,
      life: 1.0,
      emoji: emojis[Math.floor(Math.random()*emojis.length)],
      size: 12 + Math.random()*8
    });
  }
}

let state = 'idle';
let score = 0, best = 0, frame = 0, speed = 4;
let player = { x:80, y:GROUND-56, w:56, h:56, vy:0, onGround:true, jumps:0 };
let obstacles = [], nextOb = 80;

function drawCloud(x, y, s) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = 'rgba(255,220,235,0.6)';
  ctx.beginPath();
  ctx.arc(0,0,20,0,Math.PI*2);
  ctx.arc(22,-5,15,0,Math.PI*2);
  ctx.arc(40,0,18,0,Math.PI*2);
  ctx.arc(22,5,14,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawObstacle(ob) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.beginPath();
  ctx.ellipse(ob.x+ob.w/2, GROUND+4, ob.w/2, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = ob.color;
  ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
  const r=8, x=ob.x, y=ob.y, w=ob.w, h=ob.h;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(x+w*0.35,y+h*0.38,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*0.65,y+h*0.38,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#555';
  ctx.beginPath(); ctx.arc(x+w*0.35,y+h*0.38,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*0.65,y+h*0.38,2.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x+w*0.5,y+h*0.65,6,0.2*Math.PI,0.8*Math.PI); ctx.stroke();
  ctx.restore();
}

function drawBg() {
  const grad = ctx.createLinearGradient(0,0,0,GROUND);
  grad.addColorStop(0,'#FFF5FB'); grad.addColorStop(1,'#EEF6FF');
  ctx.fillStyle=grad; ctx.fillRect(0,0,GW,GROUND);
  clouds.forEach(cl => {
    cl.x -= speed*0.2*cl.s;
    if (cl.x < -80) cl.x = GW+80;
    drawCloud(cl.x, cl.y, cl.s);
  });
}

function drawGround() {
  ctx.fillStyle='#C8F0C8'; ctx.fillRect(0,GROUND,GW,8);
  const grad=ctx.createLinearGradient(0,GROUND+8,0,GH);
  grad.addColorStop(0,'#E8F8E8'); grad.addColorStop(1,'#D0EDD0');
  ctx.fillStyle=grad; ctx.fillRect(0,GROUND+8,GW,GH-GROUND-8);
  ctx.fillStyle='rgba(150,210,150,0.4)';
  for (let i=(frame*speed%40); i<GW; i+=40) {
    ctx.beginPath(); ctx.arc(i,GROUND+14,3,0,Math.PI*2); ctx.fill();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(player.x+player.w/2, GROUND+4, player.w*0.4, 5, 0, 0, Math.PI*2);
  ctx.fill();
  const squash = player.onGround ? 1 : (player.vy<0 ? 0.85 : 1.1);
  const stretch = player.onGround ? 1 : (player.vy<0 ? 1.15 : 0.9);
  ctx.translate(player.x+player.w/2, player.y+player.h/2);
  ctx.scale(squash, stretch);
  if (tepia.complete && tepia.naturalWidth>0) {
    ctx.drawImage(tepia, -player.w/2, -player.h/2, player.w, player.h);
  } else {
    ctx.fillStyle='#87CEEB'; ctx.fillRect(-20,-25,40,35);
    ctx.fillStyle='#FFD700'; ctx.fillRect(-12,-35,24,16);
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-7,-18,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-18,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.arc(-7,-18,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-18,3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawOverlay() {
  if (state==='idle') {
    ctx.fillStyle='rgba(255,255,255,0.78)'; ctx.fillRect(0,0,GW,GH);
    ctx.font='bold 28px "Fredoka One",cursive'; ctx.fillStyle='#FF6B9D'; ctx.textAlign='center';
    ctx.fillText('🤖 TEPIA RUN!', GW/2, GH/2-18);
    ctx.font='bold 15px Nunito,sans-serif'; ctx.fillStyle='#B8A8CC';
    ctx.fillText('スペースキー or タップでスタート！', GW/2, GH/2+14);
    ctx.textAlign='left';
  }
  if (state==='dead') {
    ctx.fillStyle='rgba(255,240,248,0.82)'; ctx.fillRect(0,0,GW,GH);
    ctx.font='bold 30px "Fredoka One",cursive'; ctx.fillStyle='#FF6B9D'; ctx.textAlign='center';
    ctx.fillText('💥 GAME OVER!', GW/2, GH/2-20);
    ctx.font='bold 16px Nunito,sans-serif'; ctx.fillStyle='#9B8FB4';
    ctx.fillText('スコア: '+score, GW/2, GH/2+8);
    ctx.fillText('もう一度チャレンジ！', GW/2, GH/2+30);
    ctx.textAlign='left';
  }
}

function jump() {
  if (state==='idle') { state='playing'; hintEl.textContent='ダブルジャンプもできるよ！✨'; return; }
  if (state==='dead') { resetGame(); return; }
  if (player.jumps<2) {
    player.vy=JUMP_POWER; player.onGround=false; player.jumps++;
    spawnParticles(player.x+player.w/2, player.y);
  }
}

function resetGame() {
  score=0; frame=0; speed=4; obstacles=[]; nextOb=80;
  player.y=GROUND-player.h; player.vy=0; player.onGround=true; player.jumps=0;
  particles=[]; state='playing';
  hintEl.textContent='ダブルジャンプもできるよ！✨';
}

function spawnObstacle() {
  const types=[{w:28,h:40},{w:22,h:54},{w:36,h:32},{w:24,h:48}];
  const t=types[Math.floor(Math.random()*types.length)];
  obstacles.push({ x:GW+10, y:GROUND-t.h, w:t.w, h:t.h, color:OB_COLORS[Math.floor(Math.random()*OB_COLORS.length)] });
}

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

function loop() {
  ctx.clearRect(0,0,GW,GH);
  drawBg(); drawGround();

  if (state==='playing') {
    frame++; score=Math.floor(frame/6); scEl.textContent=score;
    if (score>best) { best=score; bestEl.textContent=best; }
    speed = 4 + frame*0.0018;

    player.vy+=GRAVITY; player.y+=player.vy;
    if (player.y>=GROUND-player.h) {
      player.y=GROUND-player.h; player.vy=0; player.onGround=true; player.jumps=0;
    } else { player.onGround=false; }

    nextOb--;
    if (nextOb<=0) {
      spawnObstacle();
      nextOb=Math.max(35, 55+Math.floor(Math.random()*60)-Math.floor(speed*3));
    }
    obstacles=obstacles.filter(ob=>ob.x+ob.w>0);
    obstacles.forEach(ob=>{ ob.x-=speed; });

    const px=player.x+8, py=player.y+6, pw=player.w-16, ph=player.h-8;
    for (const ob of obstacles) {
      if (px<ob.x+ob.w-4 && px+pw>ob.x+4 && py<ob.y+ob.h-2 && py+ph>ob.y+2) {
        state='dead'; hintEl.textContent='タップ or スペースでリトライ！'; break;
      }
    }

    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.04; });
  }

  obstacles.forEach(drawObstacle);
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.font=p.size+'px serif';
    ctx.fillText(p.emoji, p.x-p.size/2, p.y);
    ctx.restore();
  });
  drawPlayer();
  drawOverlay();
  requestAnimationFrame(loop);
}

tepia.onload = () => loop();
tepia.onerror = () => loop();
</script>
</body>
</html>
